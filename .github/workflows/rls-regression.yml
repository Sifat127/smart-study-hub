name: RLS Regression

# Runs the Supabase RLS regression suite (`bun run test:rls`) on every
# publish-equivalent event:
#   - push to main (Lovable publishes from main)
#   - pull_request targeting main (pre-merge gate)
#   - manual dispatch (re-run after a publish without a new commit)
#
# On pull requests, the JUnit results are summarised and posted/updated as
# a single sticky comment on the PR.
#
# Required repository secrets:
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_PUBLISHABLE_KEY
#   TEST_USER_EMAIL
#   TEST_USER_PASSWORD
#   TEST_ADMIN_EMAIL
#   TEST_ADMIN_PASSWORD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: rls-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls:
    name: RLS regression (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      # JUnit reporter alongside `list` so we can summarise on PRs.
      PLAYWRIGHT_JUNIT_OUTPUT_NAME: rls-results.xml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Write .env for tests
        run: |
          {
            echo "VITE_SUPABASE_URL=\"${VITE_SUPABASE_URL}\""
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=\"${VITE_SUPABASE_PUBLISHABLE_KEY}\""
          } > .env

      - name: Run RLS regression suite
        id: rls
        run: |
          set -o pipefail
          bun run test:rls --reporter=list,junit | tee rls-output.txt
        continue-on-error: true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-regression-results
          path: |
            rls-results.xml
            rls-output.txt
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarise results
        if: always()
        id: summary
        shell: bash
        run: |
          OUTCOME="${{ steps.rls.outcome }}"
          if [ -f rls-results.xml ]; then
            STATS=$(python3 - <<'PY'
          import xml.etree.ElementTree as ET, glob, sys
          tests=failures=errors=skipped=0
          for f in glob.glob('rls-results.xml'):
              try: root=ET.parse(f).getroot()
              except Exception: continue
              suites=[root] if root.tag=='testsuite' else list(root.iter('testsuite'))
              for s in suites:
                  tests+=int(s.attrib.get('tests',0))
                  failures+=int(s.attrib.get('failures',0))
                  errors+=int(s.attrib.get('errors',0))
                  skipped+=int(s.attrib.get('skipped',0))
          passed=tests-failures-errors-skipped
          print(f"{tests} {passed} {failures} {errors} {skipped}")
          PY
          )
            read TESTS PASSED FAILED ERRORS SKIPPED <<< "$STATS"
          else
            TESTS=0; PASSED=0; FAILED=0; ERRORS=0; SKIPPED=0
          fi

          if [ "$OUTCOME" = "success" ]; then ICON="✅"; STATUS="passed";
          else ICON="❌"; STATUS="failed"; fi

          {
            echo "## ${ICON} RLS regression ${STATUS}"
            echo ""
            echo "| Total | Passed | Failed | Errors | Skipped |"
            echo "|------:|-------:|-------:|-------:|--------:|"
            echo "| ${TESTS:-0} | ${PASSED:-0} | ${FAILED:-0} | ${ERRORS:-0} | ${SKIPPED:-0} |"
            echo ""
            echo "Commit: \`${GITHUB_SHA::7}\` · [Run details](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            if [ -f rls-output.txt ] && [ "$OUTCOME" != "success" ]; then
              echo ""
              echo "<details><summary>Last 80 lines of test output</summary>"
              echo ""
              echo '```'
              tail -n 80 rls-output.txt
              echo '```'
              echo ""
              echo "</details>"
            fi
          } > rls-comment.md

          cat rls-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment results on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: rls-regression
          path: rls-comment.md

      - name: Fail job if tests failed
        if: steps.rls.outcome != 'success'
        run: exit 1
